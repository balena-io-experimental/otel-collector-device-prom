dist:
  module: github.com/open-telemetry/opentelemetry-collector-releases/core
  name: otelcol
  description: OpenTelemetry Collector
  version: 0.90.1
  output_path: ./_build
  otelcol_version: 0.90.1

receivers:
  - gomod: github.com/open-telemetry/opentelemetry-collector-contrib/receiver/dockerstatsreceiver v0.90.1
  - gomod: github.com/open-telemetry/opentelemetry-collector-contrib/receiver/prometheusreceiver v0.90.1
  - gomod: github.com/open-telemetry/opentelemetry-collector-contrib/receiver/journaldreceiver v0.90.1

exporters:
  - gomod: github.com/open-telemetry/opentelemetry-collector-contrib/exporter/prometheusremotewriteexporter v0.90.1
  - gomod: github.com/open-telemetry/opentelemetry-collector-contrib/exporter/lokiexporter v0.90.1

extensions:

processors:
  - gomod: github.com/open-telemetry/opentelemetry-collector-contrib/processor/resourceprocessor v0.90.1
  - gomod: go.opentelemetry.io/collector/processor/batchprocessor v0.90.1

connectors:

replaces:
  - github.com/open-telemetry/opentelemetry-collector-contrib/pkg/stanza v0.90.1 => github.com/kb2ma/opentelemetry-collector-contrib/pkg/stanza v0.0.0-20231206190541-ea0e43205d92
